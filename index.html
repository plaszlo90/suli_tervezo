function init() {
  const tf = document.getElementById('tfilters');
  const mb = mkBtn('mind','Mind', () => setT('mind'));
  mb.classList.add('active');
  tf.appendChild(mb);
  TANTARGYAK.forEach(t => tf.appendChild(mkBtn(t, shortName(t), () => setT(t))));
  updateSub();
  applyFilter();
}

function shortName(t) {
  const map = {
    'Anyagismeret':'Anyagism.',
    'Csomagolás':'Csomagolás',
    'Járművek':'Járművek',
    'Közelekedés Biztonság':'Köz.Biztons.',
    'Közlekedés építés':'Köz.Építés',
    'Statika':'Statika',
    'Statisztika':'Statisztika',
    'Személyközlekedési vállalatok':'Szem.váll.',
    'Vasúti közlekedés alapjai':'Vasúti',
    'Vezetési ismeretek':'Vezetési'
  };
  return map[t] || t.split(' ')[0];
}

function mkBtn(val, label, fn) {
  const b = document.createElement('button');
  b.className = 'filter-btn';
  b.textContent = label;
  b.dataset.val = val;
  b.onclick = fn;
  return b;
}

function mkSubBtn(val, label, fn) {
  const b = document.createElement('button');
  b.className = 'sub-btn';
  b.textContent = label;
  b.dataset.val = val;
  b.onclick = fn;
  return b;
}

function setT(t) {
  curT = t;
  curSub = 'mind';
  idx = 0;
  document.querySelectorAll('#tfilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.val === t));
  updateSub();
  applyFilter();
}

function updateSub() {
  const sf = document.getElementById('sfilters');
  sf.innerHTML = '';
  if (curT === 'mind') return;
  
  // Van-e mindkét típus?
  const tqs = ALL.filter(q => q.tantargy === curT);
  const hasMZ = tqs.some(q => q.forras === 'modulzaro');
  const hasL = tqs.some(q => q.forras === 'lecke');
  if (!hasMZ || !hasL) return;
  
  const b1 = mkSubBtn('mind', 'Összes', () => setSub('mind'));
  const b2 = mkSubBtn('lecke', 'Leckék', () => setSub('lecke'));
  const b3 = mkSubBtn('modulzaro', 'Modulzáró', () => setSub('modulzaro'));
  b1.classList.add('active');
  [b1,b2,b3].forEach(b => sf.appendChild(b));
}

function setSub(sub) {
  curSub = sub;
  idx = 0;
  document.querySelectorAll('#sfilters .sub-btn').forEach(b => b.classList.toggle('active', b.dataset.val === sub));
  applyFilter();
}

function applyFilter() {
  filtered = ALL.filter(q => {
    if (curT !== 'mind' && q.tantargy !== curT) return false;
    if (curSub !== 'mind' && q.forras !== curSub) return false;
    return true;
  });
  updateStats();
  render();
}

function key(i) { return curT+'_'+curSub+'_'+i; }

function updateStats() {
  let c=0, w=0, done=0;
  for (let i=0; i<filtered.length; i++) {
    const a = answered[key(i)];
    if (a) { done++; if(a.ok) c++; else w++; }
  }
  document.getElementById('sc').textContent = c;
  document.getElementById('sw').textContent = w;
  document.getElementById('sr').textContent = filtered.length - done;
  const pct = filtered.length ? Math.round(c/filtered.length*100) : 0;
  document.getElementById('spct').textContent = pct+'%';
  const pos = filtered.length ? (idx+1)+' / '+filtered.length : '';
  document.getElementById('npos').textContent = pos;
  document.getElementById('prog').style.width = (filtered.length ? done/filtered.length*100 : 0)+'%';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function render() {
  const area = document.getElementById('qarea');
  if (!filtered.length) { area.innerHTML = '<div class="empty">Nincs kérdés ebben a szűrőben.</div>'; return; }
  const q = filtered[idx];
  const k = key(idx);
  const ans = answered[k];
  const isMulti = q.type === 'multi';
  
  const forrasLabel = q.forras === 'modulzaro' ? 'modulzáró' : (q.lecke ? q.lecke+'. lecke' : 'lecke');
  
  let html = '<div class="qcard">';
  html += '<div class="qmeta">';
  html += '<span class="qnum">'+(idx+1)+' / '+filtered.length+'</span>';
  html += '<span class="qtag">'+esc(q.tantargy)+'</span>';
  html += '<span class="qtag">'+forrasLabel+'</span>';
  html += '</div>';
  html += '<div class="qtext">'+esc(q.text)+'</div>';
  if (isMulti) html += '<div class="hint">Több helyes válasz lehetséges</div>';
  
  q.options.forEach((opt, i) => {
    let cls = 'opt';
    const userP = ans && ans.picked.includes(i);
    const isC = q.correct.includes(i);
    if (ans) {
      cls += ' disabled';
      if (userP && isC) cls += ' correct';
      else if (userP && !isC) cls += ' wrong';
      else if (!userP && isC) cls += ' showc';
    }
    const click = ans ? '' : 'onclick="pick('+idx+','+i+')"';
    html += '<div class="'+cls+'" '+click+' data-i="'+i+'">';
    html += '<div class="circle">'+LETTERS[i]+'</div>';
    html += '<div class="otext">'+esc(opt)+'</div>';
    html += '</div>';
  });
  
  if (isMulti && !ans) {
    html += '<button class="check-btn" onclick="checkM('+idx+')">Ellenőrzés</button>';
  }
  
  if (ans) {
    html += '<div class="fb '+(ans.ok?'ok':'fail')+'">'+(ans.ok?'✓ Helyes!':'✗ Hibás – a helyes válasz(ok) zölddel jelölve.')+'</div>';
  }
  
  html += '</div>';
  area.innerHTML = html;
  document.getElementById('npos').textContent = (idx+1)+' / '+filtered.length;
}

window.pick = function(qi, oi) {
  const k = key(qi);
  if (answered[k]) return;
  const q = filtered[qi];
  if (q.type === 'single') {
    answered[k] = {picked:[oi], ok: q.correct.includes(oi)};
    updateStats(); render();
  } else {
    document.querySelectorAll('.opt')[oi].classList.toggle('sel');
  }
};

window.checkM = function(qi) {
  const k = key(qi);
  if (answered[k]) return;
  const q = filtered[qi];
  const picked = [];
  document.querySelectorAll('.opt').forEach((el,i) => { if(el.classList.contains('sel')) picked.push(i); });
  const ok = JSON.stringify(picked.slice().sort()) === JSON.stringify(q.correct.slice().sort());
  answered[k] = {picked, ok};
  updateStats(); render();
};

window.next = function() { if(idx < filtered.length-1){idx++;render();updateStats();} };
window.prev = function() { if(idx > 0){idx--;render();updateStats();} };

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') next();
  else if (e.key==='ArrowLeft') prev();
  else {
    const li = 'abcdefghij'.indexOf(e.key.toLowerCase());
    if (li>=0 && filtered[idx] && li<filtered[idx].options.length) pick(idx,li);
  }
});

init();
</script>
</body>
</html>
